org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Netzlaufwerk (Z:\, UNC): Gradle 8 + Flutter melden oft "Could not stat file \\" bei assembleDebug.
# Zuverlaessige Loesung: gesamtes Projekt nach C:\... kopieren (nicht nur build/ umleiten — Kotlin bricht sonst wegen
# gemischter Laufwerke: Pub-Cache auf C:\, android\ auf Z:\).
org.gradle.caching=false
org.gradle.configuration-cache=false
